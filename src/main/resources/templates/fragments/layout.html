<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">EvolucaoParking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<header class="header" th:fragment="header(subtitulo)">
    <div class="header-inner">
        <div class="brand">
            <span class="brand-icon">P</span>
            <div>
                <h1>EvolucaoParking</h1>
                <p th:text="${subtitulo}">Sistema</p>
            </div>
        </div>
        <nav class="nav" sec:authorize="isAuthenticated()">
            <span class="user" sec:authentication="name">user</span>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Painel admin</a>
            <a sec:authorize="hasAnyRole('ADMIN','FUNCIONARIO')" th:href="@{/operacao}">Operacao</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="btn btn-link">Sair (encerrar turno)</button>
            </form>
        </nav>
    </div>
</header>
</html>
